services:
  db:
    image: postgres:15-alpine
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin_user -d metrics_db" ]
      interval: 5s
      timeout: 5s
      retries: 5
    container_name: postgres_backend
    environment:
      POSTGRES_USER: admin_user
      POSTGRES_PASSWORD: network_password
      POSTGRES_DB: metrics_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  web:
    build: .
    container_name: python_web_api
    ports:
      - "8081:8081"
    environment:
      - DB_HOST=db
      - DB_NAME=metrics_db
      - DB_USER=admin_user
      - DB_PASSWORD=network_password
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
